<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Indro - AI Shikshak (Universal Portal)</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Shikshak Light/Bright Theme Override */
        :root {
            --shikshak-bg: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --shikshak-text: #1f2937;
            --shikshak-primary: #f59e0b; /* Friendly Orange */
            --shikshak-secondary: #3b82f6; /* Bright Blue */
            --shikshak-card: rgba(255, 255, 255, 0.7);
        }

        body.shikshak-mode {
            background: var(--shikshak-bg);
            color: var(--shikshak-text);
        }

        .shikshak-mode #header {
            background: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .shikshak-mode .logo-text, .shikshak-mode .nav-links a {
            color: var(--shikshak-text);
        }
        
        .shikshak-mode .login-btn {
            background: var(--shikshak-primary);
            color: white;
            border: none;
        }

        .shikshak-hero {
            padding-top: 150px;
            text-align: center;
            margin-bottom: 4rem;
        }
        .shikshak-hero h1 {
            font-size: 3.5rem;
            color: var(--shikshak-secondary);
            margin-bottom: 1rem;
            font-weight: 900;
        }
        .shikshak-hero p {
            font-size: 1.25rem;
            color: #4b5563;
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        .lang-toggle {
            background: white;
            border: 2px solid var(--shikshak-secondary);
            color: var(--shikshak-secondary);
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 2rem;
        }
        .lang-toggle:hover {
            background: var(--shikshak-secondary);
            color: white;
        }

        .shikshak-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
            margin-bottom: 5rem;
        }

        .s-card {
            background: var(--shikshak-card);
            border: 2px solid rgba(255,255,255,0.9);
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .s-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.15);
            border-color: var(--shikshak-primary);
        }

        .s-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .s-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--shikshak-text);
        }

        .s-card p {
            color: #6b7280;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .s-btn {
            background: var(--shikshak-primary);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
            transition: transform 0.2s ease;
        }
        .s-btn:hover {
            transform: scale(1.05);
        }

        /* Math Game Styles */
        .math-game-btn {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            background: linear-gradient(135deg, #14b8a6, #0f766e);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 30px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 10px 30px rgba(20, 184, 166, 0.4);
            cursor: pointer;
            z-index: 100;
            border: none;
            transition: all 0.3s ease;
            animation: bounce-pulse 2s infinite;
        }
        @keyframes bounce-pulse {
            0%, 100% { transform: translateY(0); box-shadow: 0 10px 30px rgba(20, 184, 166, 0.4); }
            50% { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(20, 184, 166, 0.6); }
        }

        .math-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .math-card {
            background: #0f172a;
            border: 2px solid #0ea5e9;
            box-shadow: 0 0 40px rgba(14, 165, 233, 0.5);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            color: white;
            max-width: 400px;
            width: 90%;
        }
        .math-card h2 {
            color: #38bdf8;
            font-size: 2rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
        .math-question {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 2rem 0;
            color: #fcd34d;
            text-shadow: 0 0 15px rgba(252, 211, 77, 0.5);
        }
        .math-input {
            background: rgba(255,255,255,0.1);
            border: 2px solid #38bdf8;
            color: white;
            font-size: 2rem;
            text-align: center;
            padding: 0.5rem;
            border-radius: 12px;
            width: 150px;
            margin-bottom: 1.5rem;
        }
        .math-input:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
        }
        .math-timer {
            font-size: 1.2rem;
            color: #fb7185;
            font-weight: bold;
            margin-bottom: 1rem;
        }

    </style>
</head>
<body class="shikshak-mode">

    <header id="header">
        <div class="container nav-container">
            <nav>
                <a href="index.html" class="logo" style="display: flex; align-items: center; text-decoration: none; gap: 15px; height: 55px;">
                <img src="assets/user-photo.jpg" alt="Tech Indro Logo" style="height: 100%; width: auto; object-fit: contain; border-radius: 15px; box-shadow: 0 4px 12px rgba(255,255,255,0.1); background: white;">
                
            </a>
                <ul class="nav-links">
                    <li><a href="index.html">Main Site</a></li>
                    <li><a href="shikshak-rohini.html" style="color: var(--shikshak-secondary); font-weight: bold;">Ask Rohini</a></li>
                    <li><a href="login.html" class="login-btn">Login / Sign Up</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container" style="padding-top: 120px;">


        <div class="shikshak-grid" id="coursesGrid">
            <!-- Courses loaded here -->
        </div>
    </main>



    <script>
        lucide.createIcons();

        let coursesData = [];

        async function fetchCourses() {
            try {
                const res = await fetch("http://localhost:5000/api/shikshak-courses");
                coursesData = await res.json();
                renderCourses();
            } catch (err) {
                document.getElementById("coursesGrid").innerHTML = "<p>Error loading kids courses.</p>";
            }
        }

        function renderCourses() {
            const grid = document.getElementById("coursesGrid");
            grid.innerHTML = "";
            
            coursesData.forEach(course => {
                const card = document.createElement("div");
                card.className = "s-card fade-in";
                
                // Using the first letter of title for icon if image is gradient
                const initial = course.title.charAt(0);
                
                card.innerHTML = `
                    <div class="s-icon" style="background: ${course.image};">
                        ${initial}
                    </div>
                    <h3>${course.title}</h3>
                    <p>${course.description}</p>
                    <a href="course-details.html?id=${course.id}&mode=kids" class="s-btn">Start Learning Easily</a>
                `;
                grid.appendChild(card);
            });
        }

        document.addEventListener("DOMContentLoaded", fetchCourses);


    </script>
<script src="main.js"></script>
</body>
</html>
