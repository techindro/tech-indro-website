<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Indro - Interactive Code Playground</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            background: #f8fafc;
        }
        .playground-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .playground-container {
            display: flex;
            flex: 1;
            gap: 20px;
        }
        .editor-pane, .preview-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .pane-header {
            background: var(--primary);
            color: white;
            padding: 10px 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        textarea#codeEditor {
            flex: 1;
            padding: 15px;
            border: none;
            resize: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            background: #1e1e1e;
            color: #d4d4d4;
            outline: none;
        }
        iframe#livePreview {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
            background: white;
        }
    </style>
</head>
<body>
    <header>
        <nav class="container">
            <a href="index.html" class="logo" style="display: flex; align-items: center; text-decoration: none; gap: 15px; height: 55px;">
                <img src="assets/user-photo.jpg" alt="Tech Indro Logo" style="height: 100%; width: auto; object-fit: contain; border-radius: 15px;">
            </a>
            <ul class="nav-links">
                <li><a href="programs.html">Programs</a></li>
                <li><a href="dashboard.html">My Dashboard</a></li>
                <li><a href="playground.html" style="color: var(--primary); font-weight: 800;">Playground</a></li>
                <li><a href="ai-mentor.html">AI Mentor</a></li>
            </ul>
        </nav>
    </header>

    <main style="padding-top: 120px;">
        <div class="playground-header">
            <h2><i data-lucide="code"></i> Live Code Playground</h2>
            <button class="btn-primary" onclick="runCode()"><i data-lucide="play"></i> Run Code</button>
        </div>
        <div class="playground-container">
            <div class="editor-pane">
                <div class="pane-header"><i data-lucide="file-code-2"></i> index.html</div>
                <textarea id="codeEditor" spellcheck="false">
<!-- Welcome to Tech Indro Playground! -->
<h1>Hello, World!</h1>
<style>
  h1 { color: #ec4899; text-align: center; font-family: sans-serif; margin-top: 50px;}
</style>
<script>
  console.log("Playground is ready!");
</script>
                </textarea>
            </div>
            <div class="preview-pane">
                <div class="pane-header"><i data-lucide="monitor"></i> Live Preview</div>
                <iframe id="livePreview"></iframe>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const editor = document.getElementById('codeEditor');
        const preview = document.getElementById('livePreview');

        function runCode() {
            const code = editor.value;
            const doc = preview.contentWindow.document;
            doc.open();
            doc.write(code);
            doc.close();
        }
        
        // Initial run
        runCode();
        
        // Auto-run on type (with slight debounce)
        let timeout;
        editor.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(runCode, 500);
        });
    </script>
</body>
</html>
