<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Indro - AI Mentor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 80px auto 0;
            width: 100%;
            height: calc(100vh - 80px);
            padding: 1rem;
        }
        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.2) transparent;
        }
        .chat-bubble {
            max-width: 80%;
            padding: 1.25rem;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 1.05rem;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chat-user {
            align-self: flex-end;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-bottom-right-radius: 4px;
            backdrop-filter: blur(10px);
        }
        .chat-ai {
            align-self: flex-start;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.2), rgba(236, 72, 153, 0.2));
            border: 1px solid rgba(236,72,153,0.3);
            border-bottom-left-radius: 4px;
            backdrop-filter: blur(10px);
            position: relative;
        }
        .ai-avatar-inline {
            position: absolute;
            bottom: -15px;
            left: -15px;
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--bg-main);
        }
        .chat-input-box {
            padding: 1.5rem 1rem;
            background: #0f172a;
            position: relative;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 0.5rem 1rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: border-color 0.3s ease;
        }
        .input-wrapper:focus-within {
            border-color: var(--primary);
        }
        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 0.75rem;
            font-size: 1.1rem;
            outline: none;
        }
        .input-wrapper input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        .send-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .send-btn:hover {
            transform: scale(1.1);
        }
    
        .agent-selector-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 1rem 1.5rem;
            backdrop-filter: blur(10px);
            margin-bottom: 1rem;
            border-radius: 15px;
        }
        .agent-options {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .agent-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .agent-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        .agent-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            font-weight: 600;
        }
        .icon-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s ease;
        }
        .icon-btn:hover {
            color: white;
        }

    </style>
</head>
<body>
    <header id="header">
        <div class="container nav-container">
            <nav>
                <a href="index.html" class="logo" style="display: flex; align-items: center; text-decoration: none; gap: 15px; height: 55px;">
                <img src="assets/user-photo.jpg" alt="Tech Indro Logo" style="height: 100%; width: auto; object-fit: contain; border-radius: 15px; box-shadow: 0 4px 12px rgba(255,255,255,0.1); background: white;">
                
            </a>
                <ul class="nav-links">
                    <li><a href="programs.html">Programs</a></li>
                    <li><a href="dashboard.html">My Dashboard</a></li>
                    <li><a href="ai-mentor.html" style="color: var(--primary);">AI Mentor</a></li>
                </ul>
            </nav>
        </div>
    </header>

    
    <div class="chat-container">
        <div class="agent-selector-bar">
            <div class="agent-options">
                <button class="agent-btn active" onclick="switchAgent('coding')" id="btn-coding">
                    <i data-lucide="code"></i> Coding Mentor
                </button>
                <button class="agent-btn" onclick="switchAgent('career')" id="btn-career">
                    <i data-lucide="briefcase"></i> Career Coach
                </button>
                <button class="agent-btn" onclick="switchAgent('debug')" id="btn-debug">
                    <i data-lucide="bug"></i> Bug Fixer
                </button>
            </div>
            <div>
                <select id="chatLang" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 0.4rem 0.8rem; border-radius: 8px; outline: none; cursor: pointer; font-family: inherit;">
                    <option value="en" style="color: black;">English</option>
                    <option value="hi" style="color: black;">Hindi / Hinglish</option>
                </select>
            </div>
        </div>

        <div class="chat-history" id="chatHistory">
            <div class="chat-bubble chat-ai" id="welcomeMsg">
                <div class="ai-avatar-inline"><i data-lucide="bot" style="width: 20px; height: 20px;"></i></div>
                <strong id="agentName">Coding Mentor</strong><br>
                <span id="agentGreeting">Namaste! Main aapka 24/7 AI Coding Mentor hoon. Aap mujhse kisi bhi language, framework ya hackathon ke baare me pooch sakte hain!</span>
            </div>
        </div>
        
        <div class="chat-input-box">
            <form id="chatForm" class="input-wrapper">
                <button type="button" class="icon-btn" title="Upload File" onclick="document.getElementById('fileUpload').click()">
                    <i data-lucide="paperclip"></i>
                </button>
                <input type="file" id="fileUpload" style="display: none;" onchange="alert('File ' + this.files[0].name + ' selected for upload!')">
                
                <input type="text" id="chatInput" placeholder="Type your message here..." autocomplete="off">
                
                <button type="button" class="icon-btn" title="Voice Input (Mic)" onclick="alert('Microphone activated! Speak now...')">
                    <i data-lucide="mic"></i>
                </button>

                <button type="submit" class="send-btn">
                    <i data-lucide="send" style="width: 18px; height: 18px;"></i>
                </button>
            </form>
        </div>
    </div>


    <script>

        lucide.createIcons();

        const form = document.getElementById('chatForm');
        const input = document.getElementById('chatInput');
        const history = document.getElementById('chatHistory');
        const langSelect = document.getElementById('chatLang');
        
        let currentAgent = 'coding';
        const agentData = {
            'coding': { name: 'Coding Mentor', greeting: 'Namaste! Main aapka 24/7 AI Coding Mentor hoon. Aap mujhse kisi bhi language, framework ya hackathon ke baare me pooch sakte hain!' },
            'career': { name: 'Career Coach', greeting: 'Hello! Main aapka Career Coach hoon. Resume building, interview prep aur placements me main aapki help karunga.' },
            'debug': { name: 'Bug Fixer', greeting: 'Hey! Code me error aa raha hai? Apna code yahan paste kijiye ya file upload kijiye, main turant fix kar dunga!' }
        };

        window.switchAgent = function(agent) {
            currentAgent = agent;
            document.querySelectorAll('.agent-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + agent).classList.add('active');
            
            document.getElementById('agentName').innerText = agentData[agent].name;
            document.getElementById('agentGreeting').innerText = agentData[agent].greeting;
            
            // Clear chat history when switching agents
            const welcomeBubble = document.getElementById('welcomeMsg').outerHTML;
            history.innerHTML = welcomeBubble;
            lucide.createIcons();
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = input.value.trim();
            if(!msg) return;

            const userBubble = document.createElement('div');
            userBubble.className = 'chat-bubble chat-user';
            userBubble.innerText = msg;
            history.appendChild(userBubble);
            
            input.value = '';
            history.scrollTop = history.scrollHeight;

            const lang = langSelect.value;
            
            const typingBubble = document.createElement('div');
            typingBubble.className = 'chat-bubble chat-ai';
            typingBubble.innerHTML = `
                <div class="ai-avatar-inline"><i data-lucide="bot" style="width: 20px; height: 20px;"></i></div>
                <strong>${agentData[currentAgent].name}</strong><br>
                <em>Thinking...</em>
            `;
            history.appendChild(typingBubble);
            lucide.createIcons();
            history.scrollTop = history.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, lang: lang, agent: currentAgent })
                });
                
                const data = await response.json();
                
                typingBubble.innerHTML = `
                    <div class="ai-avatar-inline"><i data-lucide="bot" style="width: 20px; height: 20px;"></i></div>
                    <strong>${agentData[currentAgent].name}</strong><br>
                    ${data.response ? data.response.replace(/\n/g, '<br>') : 'Error parsing response'}
                `;
            } catch (error) {
                typingBubble.innerHTML = `
                    <div class="ai-avatar-inline"><i data-lucide="bot" style="width: 20px; height: 20px;"></i></div>
                    <strong>${agentData[currentAgent].name}</strong><br>
                    <em>Sorry, the server is offline. (AI processing requires backend connection)</em>
                `;
            }
            
            lucide.createIcons();
            history.scrollTop = history.scrollHeight;
        });

</script>
<script src="main.js"></script>
</body>
</html>
